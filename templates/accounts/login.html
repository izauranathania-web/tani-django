<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — TaniApp</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f1117;min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-wrap{width:100%;max-width:380px;padding:20px}
.login-card{background:#fff;border-radius:10px;padding:36px 32px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.brand{text-align:center;margin-bottom:28px}
.brand .logo{font-size:36px;margin-bottom:8px}
.brand h1{font-size:22px;font-weight:700;color:#0f1117}
.brand h1 span{color:#1a6b4a}
.brand p{font-size:12px;color:#6b7280;margin-top:4px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:5px}
.form-group input{width:100%;padding:10px 12px;border:1.5px solid #e5e7eb;border-radius:6px;font-size:14px;outline:none;transition:border .15s}
.form-group input:focus{border-color:#1a6b4a}
.btn-login{width:100%;padding:11px;background:#1a6b4a;color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:700;cursor:pointer;margin-top:6px;transition:background .15s}
.btn-login:hover{background:#155c3d}
.alert{padding:10px 12px;border-radius:5px;font-size:13px;margin-bottom:14px;background:#fef2f2;border:1px solid #fca5a5;color:#991b1b}
.footer-note{text-align:center;margin-top:20px;font-size:11px;color:#6b7280}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="brand">
      <div class="logo">🌱</div>
      <h1>Tani<span>App</span></h1>
      <p>Sistem Manajemen Pertanian</p>
    </div>
    {% if messages %}
      {% for msg in messages %}
        <div class="alert">⚠️ {{ msg }}</div>
      {% endfor %}
    {% endif %}
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="Masukkan username" autofocus required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Masukkan password" required>
      </div>
      <button type="submit" class="btn-login">Masuk →</button>
    </form>
    <div class="footer-note">TaniApp v1.0 · 2026</div>
  </div>
</div>
</body>
</html>
